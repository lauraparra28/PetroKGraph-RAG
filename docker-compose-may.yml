services:
  neo4j:
    image: neo4j:5.20.0-enterprise # 5.20.0-enterprise-bullseye ou 5.20.0-enterprise  ou 5.20-enterprise-ubi9
    container_name: PetroKGraph-merge-may-2026
    restart: unless-stopped
    ports:
      - "7473:7473"   # HTTPS
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/diripar8$
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["graph-data-science","n10s","apoc","apoc-extended"] #
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*,dbms.*,algo.*,schema.*,graphql.*,ga.*,n10s.*,semantics.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*,dbms.*,algo.*,schema.*,graphql.*,ga.*,n10s.*,semantics.*
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use_neo4j_config=true
    volumes:
      #- ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - "/mnt/c/Users/lauri/neo4j/imports:/import"
      # Montar tu OWL local dentro del contenedor
      #- "/mnt/c/Users/lauraparra/neo4j/imports:/import"